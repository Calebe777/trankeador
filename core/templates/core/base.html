<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Trankeador Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .gradient-text {
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sidebar-link {
            transition: all 0.2s ease-in-out;
        }
        .sidebar-link:hover {
            background-color: rgba(99, 102, 241, 0.1);
            color: #818cf8;
        }
        
        /* Global Form Styling for Django as_p */
        .django-form-container p {
            margin-bottom: 1.25rem;
        }
        .django-form-container label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #cbd5e1;
            margin-bottom: 0.375rem;
        }
        .django-form-container input[type="text"],
        .django-form-container input[type="url"],
        .django-form-container input[type="email"],
        .django-form-container input[type="password"],
        .django-form-container select,
        .django-form-container textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: rgba(15, 23, 42, 0.5);
            border: 1px solid #334155;
            border-radius: 0.75rem;
            color: white;
            transition: all 0.2s;
        }
        .django-form-container input:focus,
        .django-form-container select:focus,
        .django-form-container textarea:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }
        .django-form-container select option {
            background-color: #0f172a;
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden selection:bg-indigo-500 selection:text-white">

    <!-- Sidebar -->
    <aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col hidden md:flex z-20">
        <div class="h-20 flex items-center px-8 border-b border-slate-800">
            <i class="fas fa-link text-xl text-indigo-400 mr-3"></i>
            <span class="text-xl font-bold text-white tracking-wide">Trankeador</span>
        </div>
        
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
            <a href="{% url 'dashboard' %}" class="sidebar-link flex items-center px-4 py-3 text-slate-300 rounded-xl font-medium {% if request.resolver_match.url_name == 'dashboard' %}bg-indigo-500/10 text-indigo-400{% endif %}">
                <i class="fas fa-chart-pie w-6"></i> Dashboard
            </a>
            
            <div class="pt-4 pb-2 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Gestão</div>
            
            <a href="{% url 'page_list' %}" class="sidebar-link flex items-center px-4 py-3 text-slate-300 rounded-xl font-medium {% if 'page' in request.resolver_match.url_name %}bg-indigo-500/10 text-indigo-400{% endif %}">
                <i class="fas fa-file-alt w-6"></i> Páginas
            </a>
            <a href="{% url 'campaign_list' %}" class="sidebar-link flex items-center px-4 py-3 text-slate-300 rounded-xl font-medium {% if 'campaign' in request.resolver_match.url_name %}bg-indigo-500/10 text-indigo-400{% endif %}">
                <i class="fas fa-bullhorn w-6"></i> Campanhas
            </a>
            <a href="{% url 'person_list' %}" class="sidebar-link flex items-center px-4 py-3 text-slate-300 rounded-xl font-medium {% if 'person' in request.resolver_match.url_name %}bg-indigo-500/10 text-indigo-400{% endif %}">
                <i class="fas fa-users w-6"></i> Pessoas
            </a>
            
            <div class="pt-4 pb-2 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Links</div>
            
            <a href="{% url 'link_list' %}" class="sidebar-link flex items-center px-4 py-3 text-slate-300 rounded-xl font-medium {% if 'link' in request.resolver_match.url_name %}bg-indigo-500/10 text-indigo-400{% endif %}">
                <i class="fas fa-link w-6"></i> Meus Links
            </a>
        </nav>
        
        <div class="p-4 border-t border-slate-800">
            <div class="flex items-center px-4 py-3 bg-slate-800/50 rounded-xl">
                <div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-sm font-bold mr-3">
                    {{ user.username.0|upper }}
                </div>
                <div class="flex-1 overflow-hidden">
                    <p class="text-sm font-medium text-white truncate">{{ user.username }}</p>
                    <form action="{% url 'logout' %}" method="post" class="inline">
                        {% csrf_token %}
                        <button type="submit" class="text-xs text-slate-400 hover:text-red-400 transition-colors">Sair</button>
                    </form>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col relative overflow-hidden bg-slate-900 bg-opacity-95">
        <!-- Background Decorator -->
        <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-indigo-500/10 rounded-full blur-3xl -mr-48 -mt-48 pointer-events-none"></div>
        <div class="absolute bottom-0 left-0 w-[400px] h-[400px] bg-purple-500/10 rounded-full blur-3xl -ml-32 -mb-32 pointer-events-none"></div>

        <!-- Header Mobile -->
        <header class="md:hidden h-16 border-b border-slate-800 flex items-center justify-between px-4 z-10 bg-slate-900">
            <div class="flex items-center">
                <i class="fas fa-link text-indigo-400 mr-2"></i>
                <span class="font-bold text-white">Trankeador</span>
            </div>
            <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button type="submit" class="text-slate-400"><i class="fas fa-sign-out-alt"></i></button>
            </form>
        </header>

        <!-- Content Area -->
        <div class="flex-1 overflow-y-auto p-6 md:p-10 z-10 scroll-smooth">
            <div class="max-w-6xl mx-auto">
                {% block content %}{% endblock %}
            </div>
        </div>
    </main>

    <!-- Global Toast -->
    <div id="toast" class="fixed bottom-5 right-5 bg-emerald-500/20 border border-emerald-500/50 text-emerald-400 px-6 py-3 rounded-xl shadow-lg flex items-center transition-all duration-300 opacity-0 pointer-events-none translate-y-4 z-50">
        <i class="fas fa-check-circle mr-2"></i>
        <span id="toast-message">Copiado com sucesso!</span>
    </div>

    <script>
        function copyLink(elementId) {
            const element = document.getElementById(elementId);
            const linkText = element.innerText.trim();
            
            const showToast = () => {
                const toast = document.getElementById('toast');
                toast.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
                toast.classList.add('opacity-100', 'translate-y-0');
                setTimeout(() => {
                    toast.classList.remove('opacity-100', 'translate-y-0');
                    toast.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
                }, 3000);
            };

            // Brute-force copy fallback for all browsers/protocols
            const textArea = document.createElement("textarea");
            textArea.value = linkText;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            textArea.style.top = "0";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            textArea.setSelectionRange(0, 99999);
            
            try {
                document.execCommand('copy');
                showToast();
            } catch (err) {
                // Se falhar o execCommand, tenta o navigator como última opção
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(linkText).then(showToast);
                }
            }
            document.body.removeChild(textArea);
        }
    </script>
</body>
</html>
