<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite Inválido</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.2) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.2) 0, transparent 50%);
            background-attachment: fixed;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 selection:bg-indigo-500 selection:text-white">

    <div class="glass-panel w-full max-w-md rounded-3xl p-8 sm:p-10 text-center relative overflow-hidden">
        <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-red-500/10 border border-red-500/20 mb-6">
            <i class="fas fa-times text-4xl text-red-400"></i>
        </div>
        
        <h1 class="text-2xl font-bold text-white mb-3">Acesso Negado</h1>
        <p class="text-slate-400 mb-8">{{ error|default:"O link de convite é inválido ou já expirou." }}</p>
        
        <a href="{% url 'login' %}" class="inline-block py-3 px-6 bg-slate-800 hover:bg-slate-700 text-white font-medium rounded-xl transition-colors">
            Voltar para o Login
        </a>
    </div>

</body>
</html>
