<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Trankeador Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.2) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.2) 0, transparent 50%);
            background-attachment: fixed;
        }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .gradient-text {
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Form Styling */
        .django-form-container p { margin-bottom: 1rem; }
        .django-form-container label {
            display: block; font-size: 0.875rem; font-weight: 500; color: #cbd5e1; margin-bottom: 0.375rem;
        }
        .django-form-container input {
            width: 100%; padding: 0.75rem 1rem; background-color: rgba(15, 23, 42, 0.5);
            border: 1px solid #334155; border-radius: 0.75rem; color: white; transition: all 0.2s;
        }
        .django-form-container input:focus {
            outline: none; border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }
        .helptext { font-size: 0.75rem; color: #64748b; margin-top: 0.25rem; display: block; }
        ul.errorlist { color: #f87171; font-size: 0.875rem; margin-bottom: 0.5rem; list-style-type: none; padding: 0; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 selection:bg-indigo-500 selection:text-white">

    <div class="glass-panel w-full max-w-md rounded-3xl p-8 sm:p-10 relative overflow-hidden my-8">
        <div class="absolute top-0 left-0 w-32 h-32 bg-gradient-to-br from-indigo-500/20 to-purple-500/0 rounded-br-full -ml-4 -mt-4 pointer-events-none"></div>
        
        <div class="text-center mb-8 relative z-10">
            <h1 class="text-3xl font-extrabold text-white mb-2">Bem-vindo à <span class="gradient-text">Acadiprev</span></h1>
            <p class="text-slate-400 text-sm">Crie seu usuário de acesso ao sistema com o convite especial que você recebeu.</p>
        </div>

        <form method="post" class="space-y-4 relative z-10">
            {% csrf_token %}
            
            <div class="django-form-container">
                {{ form.as_p }}
            </div>

            <button type="submit" class="w-full py-3.5 px-4 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded-xl shadow-lg shadow-indigo-500/20 transition-all hover:shadow-indigo-500/40 hover:-translate-y-0.5 mt-6 flex justify-center items-center">
                Criar Minha Conta <i class="fas fa-user-plus ml-2 text-sm"></i>
            </button>
        </form>
    </div>

</body>
</html>
